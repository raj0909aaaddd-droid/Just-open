<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Romisa's Universe 🌊🤖</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { overflow: hidden; background: #000; color: white; font-family: 'Georgia', serif; height: 100vh; width: 100vw; perspective: 1200px; }
  
  /* 🌊 BACKGROUNDS */
  #water-bg { position: fixed; inset: 0; z-index: -3; background: linear-gradient(180deg, #001233 0%, #005f73 50%, #0a9396 100%); filter: url(#water-filter); opacity: 0.95; }
  .water-overlay { position: fixed; inset: 0; background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.1) 0%, #000 100%); z-index: -2; }
  #nature-video { display: none; position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -4; opacity: 0; }

  /* 🎬 UI SCREENS */
  .screen { display: none; position: absolute; inset: 0; flex-direction: column; align-items: center; justify-content: center; z-index: 10; opacity: 0; }
  .ui-box { background: rgba(0, 15, 30, 0.85); padding: 25px; border-radius: 25px; text-align: center; border: 2px solid rgba(10, 147, 150, 0.6); backdrop-filter: blur(15px); width: 90%; max-width: 400px; }
  .btn { padding: 15px 25px; font-size: 18px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin: 10px; }
  .btn-primary { background: linear-gradient(135deg, #ff4d6d, #c9184a); color: white; box-shadow: 0 5px 20px rgba(255, 77, 109, 0.5); }
    /* 🔐 PASSWORD & INTRO */
  #security-input { width: 80%; padding: 15px; font-size: 20px; text-align: center; border-radius: 10px; border: 2px solid #0a9396; background: #000; color: #0a9396; margin: 20px 0; outline: none; letter-spacing: 5px; }
  #intro { position: fixed; inset: 0; z-index: 999; display: flex; align-items: center; justify-content: center; background: #000; }
  .nf-letter { font-size: 15vw; font-weight: 900; font-family: 'Arial Black', sans-serif; color: #e50914; opacity: 0; transform: scale(2.5); filter: blur(12px); text-shadow: 0 0 40px rgba(229,9,20,0.9); }

  /* 🐍 GAMES */
  #snake-canvas { background: #010a15; border-radius: 12px; margin-top: 15px; box-shadow: inset 0 0 20px rgba(0, 119, 182, 0.8); touch-action: none; }
  #tramp-area { width: 100%; height: 300px; position: relative; overflow: hidden; background: rgba(0,0,0,0.5); border-radius: 15px; border: 2px dashed #0a9396; margin-top:15px; }
  #paddle { width: 100px; height: 20px; background: #ff4d6d; border-radius: 10px; position: absolute; bottom: 10px; left: 100px; box-shadow: 0 0 15px #ff4d6d; }
  #falling-bot { width: 40px; height: 40px; position: absolute; top: 0; left: 130px; font-size: 30px; }
    /* 🤖 ROBOTS */
  .speech-bubble { 
      position: absolute; top: -65px; background: #fff; color: #111; padding: 10px 15px; 
      border-radius: 15px; font-size: 12px; font-weight: bold; opacity: 0; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 10; max-width: 140px; text-align: center;
  }
  .speech-bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: #fff transparent transparent transparent; }
  .thruster { width: 24px; height: 40px; background: linear-gradient(to bottom, #fff, #ffdd00, #ff3300, transparent); border-radius: 50% 50% 20% 20%; position: absolute; bottom: -30px; left: 38px; animation: flicker 0.1s infinite alternate; display: none; filter: blur(2px); }
  @keyframes flicker { 0% { opacity: 0.7; } 100% { opacity: 1; } }
  .scene-bot { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 50; width: 100px; }

  /* 📖 3D DIARY */
  .book-container { perspective: 2500px; }
  .book { width: 300px; height: 420px; position: relative; transform-style: preserve-3d; transform: rotateX(15deg) rotateY(-5deg); }
  .page { position: absolute; width: 100%; height: 100%; top: 0; right: 0; background: #fffcf2; transform-origin: left; transition: transform 1.4s cubic-bezier(0.645, 0.045, 0.355, 1); border-radius: 5px 15px 15px 5px; padding: 30px; font-size: 18px; color: #2c1e1e; font-style: italic; border: 1px solid #d4d4d4; display: flex; align-items: center; justify-content: center; text-align: center; }
  .page.flipped { transform: rotateY(-180deg); }
  .cover { background: linear-gradient(135deg, #4a001f, #800040); color: #fcc419; font-weight: 900; font-size: 32px; border-left: 15px solid #2a0012; }
    /* 📖 PHOTO STORY VIBE */
  #story-overlay { position: absolute; inset: 0; z-index: 300; display: none; align-items: center; justify-content: center; background-size: cover; background-position: center; transition: background-image 2s ease-in-out; }
  #story-overlay::before { content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }
  #story-text { width: 85%; text-align: center; font-size: 22px; line-height: 1.6; color: #fff; text-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 310; opacity: 0; font-style: italic; }

  /* 🏮 CREDITS & LANTERNS */
  #screen-credits { background: transparent; overflow: hidden; }
  .lantern { position: absolute; bottom: -100px; width: 40px; height: 60px; background: rgba(255, 165, 0, 0.8); border-radius: 10px; box-shadow: 0 0 20px gold; animation: floatL 25s linear forwards; }
  @keyframes floatL { to { transform: translateY(-110vh) translateX(40px); opacity: 0; } }
  #credits-text { position: absolute; top: 100%; width: 100%; text-align: center; color: #fcc419; font-size: 22px; line-height: 2.8; text-shadow: 0 0 15px gold; white-space: pre-line; z-index: 10; font-weight: bold; }
  .credits-scroll { animation: scrollUp 45s linear forwards; }
  @keyframes scrollUp { to { top: -250%; } }
</style>
</head>
<body>
<svg style="display:none;"><filter id="water-filter"><feTurbulence type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="3" id="turb"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="25"/></filter></svg>
<div id="water-bg"></div><div class="water-overlay"></div>
<video id="nature-video" src="https://cdn.pixabay.com/video/2020/05/14/38894-420790924_large.mp4" loop muted playsinline></video>
<audio id="bg-music" src="love.mp3" loop></audio>
<audio id="piano-music" src="piano.mp3" loop></audio>

<div id="screen-password" class="screen" style="display:flex; opacity:1;">
  <div class="ui-box">
    <h2 style="color:#0a9396; font-family:monospace;">SYSTEM LOCKED</h2>
    <input type="text" id="security-input" placeholder="PASSCODE" autocomplete="off">
    <button class="btn btn-primary" onclick="checkPassword()">UNLOCK</button>
  </div>
</div>

<div id="intro" style="display:none;"><div class="nf-letter">R</div><div class="nf-letter">O</div><div class="nf-letter">M</div><div class="nf-letter">I</div><div class="nf-letter">S</div><div class="nf-letter">A</div></div>

<div id="screen-snake" class="screen">
  <div class="ui-box">
    <h2 style="color:#0a9396;">Feed the Love! ❤️</h2>
    <canvas id="snake-canvas" width="300" height="300"></canvas>
  </div>
</div>
<div id="screen-tramp" class="screen">
  <div class="ui-box">
    <h2 style="color:#ff4d6d;">Catch Clumsy Bot! 😱</h2><h3 id="bounce-score">Bounces: 0/10</h3>
    <div id="tramp-area"><div id="falling-bot">🤖</div><div id="paddle"></div></div>
  </div>
</div>

<div id="screen-lie" class="screen">
  <div class="ui-box">
    <h2 style="color:#e9d8a6;">🕵️‍♂️ Lie Detector</h2>
    <div style="display:flex; justify-content:center; gap:20px; margin:15px 0;">
      <svg viewBox="0 0 100 130" width="60" height="80"><rect x="25" y="20" width="50" height="40" rx="10" fill="#00b4d8" stroke="#fff" stroke-width="2"/><text id="lie-face-1" x="50" y="45" fill="#fff" font-size="16" text-anchor="middle">O_O</text></svg>
      <svg viewBox="0 0 100 130" width="60" height="80"><rect x="25" y="20" width="50" height="40" rx="10" fill="#ff4d6d" stroke="#fff" stroke-width="2"/><text id="lie-face-2" x="50" y="45" fill="#fff" font-size="16" text-anchor="middle">O_O</text></svg>
    </div>
    <h3 id="lie-question">Who is the real boss?</h3>
    <button class="btn btn-primary" onclick="lieAnswer('Raj')">Raj 😎</button>
    <button class="btn btn-primary" onclick="lieAnswer('Romisa')">Romisa 👑</button>
  </div>
</div>

<div id="screen-glitch" class="screen">
  <div class="ui-box">
    <h2 style="color:red;">CONNECTION LOST</h2>
    <div style="border:5px solid #333; border-top:5px solid red; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto;"></div>
    <div style="position:relative; height:100px;"><div id="glitch-bot" style="position:absolute; left:-50px; font-size:40px;">🤖🔨</div></div>
    <p id="glitch-text">10 Seconds to Repair...</p>
  </div>
</div>
<div id="screen-gallery" class="screen"><div class="ui-box" style="background:transparent; border:none;"><div class="polaroid-container" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;" id="gallery-grid"></div></div></div>

<div id="screen-diary" class="screen"><div class="book-container"><div class="book" id="diary-book"></div></div></div>

<div id="screen-finale" class="screen">
  <div id="finale-stage">
    <div id="love-text" style="position:absolute; top:20%; width:100%; text-align:center; font-size:40px; color:#ff4d6d; text-shadow:0 0 20px red; right:-200vw; font-weight:900;">I LOVE YOU<br>ROMISA ❤️</div>
    <div class="scene-bot" id="main-bot" style="right:-200px; top:45%;"><div class="speech-bubble" id="bubble-main"></div><svg viewBox="0 0 100 130" width="100" height="130"><rect x="25" y="20" width="50" height="40" rx="10" fill="#888" stroke="#fff"/><text id="face-main" x="50" y="42" fill="#0a9396" font-size="14" font-weight="bold" text-anchor="middle">^_^</text><rect x="30" y="65" width="40" height="50" rx="10" fill="#ccc"/></svg><div class="thruster" id="main-fire"></div></div>
    <div class="scene-bot" id="clumsy-bot" style="left:45%; top:-200px;"><div class="speech-bubble" id="bubble-clumsy"></div><svg id="svg-clumsy" viewBox="0 0 100 130" width="100" height="130"><rect x="25" y="20" width="50" height="40" rx="10" fill="#fb8500" stroke="#fff"/><text id="face-clumsy" x="50" y="42" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">x_x</text><rect x="25" y="65" width="50" height="45" rx="5" fill="#fca311"/></svg></div>
    <div class="scene-bot" id="raj-bot" style="right:50%; top:-300px;"><div class="speech-bubble" id="bubble-raj"></div><svg viewBox="0 0 100 130" width="100" height="130"><rect x="25" y="20" width="50" height="40" rx="10" fill="#00b4d8" stroke="#fff"/><text id="face-raj" x="50" y="42" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">O_O</text><rect x="25" y="65" width="50" height="45" rx="5" fill="#023e8a"/></svg></div>
  </div>
</div>

<div id="story-overlay"><div id="story-text"></div></div>
<div id="screen-credits" class="screen"><div id="credits-text"></div></div>
  <script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSFX(f, d, t='sine') {
  if(audioCtx.state === 'suspended') audioCtx.resume();
  let o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = t; o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(f, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
  o.start(); o.stop(audioCtx.currentTime + d);
}

function showScreen(id) { 
  document.querySelectorAll('.screen').forEach(s => {s.style.display='none'; s.style.opacity='0';});
  let s = document.getElementById(id); s.style.display='flex'; gsap.to(s, {opacity: 1, duration: 1}); 
}

function checkPassword() {
  if(document.getElementById('security-input').value.toLowerCase() === 'romisa') {
    document.getElementById('bg-music').play();
    showScreen('intro'); gsap.to('.nf-letter', {opacity:1, scale:1, filter:"blur(0px)", duration:1.5, stagger:0.2});
    setTimeout(() => { showScreen('screen-snake'); initSnake(); }, 5000);
  }
}
function initSnake() {
  let c = document.getElementById('snake-canvas'), ctx = c.getContext('2d'), snake = [{x:150, y:150}], food = {x:105, y:105}, dx=15, dy=0, score=0;
  let sLoop = setInterval(() => {
    ctx.clearRect(0,0,300,300); ctx.fillStyle='#ff4d6d'; ctx.fillText("❤️", food.x-11, food.y+11);
    snake.forEach(p => { ctx.fillStyle='#0a9396'; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill(); });
    let h = {x: snake[0].x+dx, y: snake[0].y+dy}; snake.unshift(h);
    if(Math.abs(h.x-food.x)<20 && Math.abs(h.y-food.y)<20) { score++; food={x:Math.random()*250+25, y:Math.random()*250+25}; if(score>=5){clearInterval(sLoop); showScreen('screen-tramp'); initTramp();} } else snake.pop();
  }, 120);
  c.addEventListener('touchstart', e => { let tx = e.touches[0].clientX, ty = e.touches[0].clientY; c.addEventListener('touchmove', e2 => { let dxT = tx - e2.touches[0].clientX, dyT = ty - e2.touches[0].clientY; if(Math.abs(dxT)>Math.abs(dyT)){dx=dxT>0?-15:15;dy=0;}else{dy=dyT>0?-15:15;dx=0;} }, {once:true}); });
}

function initTramp() {
  let b=document.getElementById('falling-bot'), p=document.getElementById('paddle'), bx=130, by=0, bdx=4, bdy=5, score=0, padX=100;
  let tLoop = setInterval(() => {
    bx+=bdx; by+=bdy; if(bx<=0 || bx>=260) bdx*=-1; if(by<=0){by=0; bdy=Math.abs(bdy);}
    if(by>=250 && by<=270 && bx>=padX-40 && bx<=padX+100) {bdy=-Math.abs(bdy)-0.5; score++; document.getElementById('bounce-score').innerText=`Bounces: ${score}/10`;}
    if(by>300){by=0; score=0;} if(score>=10){clearInterval(tLoop); showScreen('screen-lie');}
    b.style.left=bx+'px'; b.style.top=by+'px';
  }, 20);
  document.getElementById('tramp-area').addEventListener('touchmove', e => { padX = e.touches[0].clientX - 50; p.style.left=padX+'px'; });
}

function lieAnswer(a) { if(a==='Romisa' || document.getElementById('lie-question').innerText.includes('love')) { if(document.getElementById('lie-question').innerText.includes('boss')) { document.getElementById('lie-question').innerText="Who loves who more?"; } else { showScreen('screen-glitch'); initRepair(); } } }

function initRepair() {
  let time = 10; let iv = setInterval(() => { time--; document.getElementById('glitch-text').innerText = `${time} Seconds to Repair...`; playSFX(200, 0.1, 'square'); if(time <= 0) { clearInterval(iv); initGallery(); } }, 1000);
  gsap.to('#glitch-bot', {left:'40%', duration:2, yoyo:true, repeat:-1});
    }
function initGallery() {
  showScreen('screen-gallery'); const g = document.getElementById('gallery-grid');
  ["⭐", "💖", "🌹", "👑", "❤️", "🤫"].forEach((m) => {
    let p = document.createElement('div'); p.style.width="80px"; p.style.height="100px"; p.style.background="#fff"; p.style.display="flex"; p.style.alignItems="center"; p.style.justifyContent="center"; p.style.fontSize="30px"; p.style.borderRadius="10px"; p.innerText="Tap";
    p.onclick = () => { p.innerText=m; p.classList.add('rev'); if(document.querySelectorAll('.rev').length===6) setTimeout(startDiary, 1000); };
    g.appendChild(p);
  });
}

function startDiary() {
  showScreen('screen-diary'); const b = document.getElementById('diary-book');
  ["Romisa...", "You are special.", "Distance is hard.", "But worth it.", "Every gift.", "My dream.", "Turn page...", "Surprise! 🎁"].forEach((t, i) => {
    let p = document.createElement('div'); p.className='page'; p.style.zIndex=10-i; p.innerHTML=`<p>${t}</p>`;
    p.onclick = () => { p.classList.add('flipped'); playSFX(400,0.2); if(i===7) setTimeout(startComedyFinale, 1500); }; b.appendChild(p);
  });
}

function setFace(id, f, c) { document.getElementById(`face-${id}`).textContent=f; if(c) document.getElementById(`face-${id}`).setAttribute('fill',c); }
function setSpeech(id, t) { const b=document.getElementById(`bubble-${id}`); b.innerText=t; gsap.to(b,{opacity:t?1:0, duration:0.3}); }
function startComedyFinale() {
  showScreen('screen-finale'); const tl = gsap.timeline();
  tl.to('#love-text', {right:'0vw', duration:3})
    .to('#main-bot', {right:'35%', duration:2}, "-=1")
    .to('#clumsy-bot', {top:'40%', duration:0.8, ease:"bounce.out"})
    .add(() => {setFace('clumsy','X_X'); playSFX(150, 0.5); setSpeech('clumsy',"Sorry! 🤕");})
    .add(() => {setFace('main', '>_<', '#ff0000'); setSpeech('main', "Stupid! 😡");}, "+=2.5")
    .to('#main-bot',{right:'42%', duration:0.4})
    .add(() => playSFX(800, 0.1, 'square'))
    .to('#clumsy-bot', {x:-40, rotation:-20, duration:0.1, yoyo:true, repeat:1})
    .to('#clumsy-bot', {left:'5%', top:'80%', duration:2}, "+=1.5")
    .to('#main-bot', {right:'50%', x:'50%', duration:1.5})
    .add(() => {document.getElementById('main-fire').style.display='block'; playSFX(50, 5, 'sawtooth');})
    .to('#main-bot', {top:'-300px', duration:5}) // 5s Up
    .to('#main-bot', {top:'40%', right:'35%', duration:5}, "+=1") // 5s Down
    .to('#raj-bot', {top:'45%', right:'55%', duration:5}, "<")
    .add(() => {document.getElementById('main-fire').style.display='none'; setFace('raj','>///<','#ff4da6'); setSpeech('raj',"Ro-ro-romisa... 😳");})
    .add(() => {setSpeech('raj', "I have a story... ❤️"); setTimeout(startPhotoStory, 4000);}, "+=4");
    }
const story = ["Before I met you...", "The world was quiet.", "Then you arrived.", "Like a sunrise.", "Every talk...", "A new star.", "Distance is just a test.", "I will pass it.", "For you.", "You are my peace.", "My favorite smile.", "I built this universe...", "Just for Romisa.", "I love you. ❤️"]; // Add your full 65 pages here
const vibes = ["https://images.unsplash.com/photo-1464802686167-b939a67a06a1", "https://images.unsplash.com/photo-1501854140801-50d01698950b", "https://images.unsplash.com/photo-1475113548554-5a36f1f523d6"];

function startPhotoStory() {
  const overlay = document.getElementById('story-overlay');
  const text = document.getElementById('story-text');
  overlay.style.display='flex';
  const piano = document.getElementById('piano-music'); piano.play();
  
  let idx = 0;
  function next() {
    if(idx < story.length) {
      overlay.style.backgroundImage = `url('${vibes[idx % vibes.length]}?auto=format&fit=crop&w=800')`;
      gsap.to(text, {opacity: 0, duration: 1, onComplete: () => {
        text.innerText = story[idx];
        gsap.to(text, {opacity: 1, duration: 1.5});
        idx++; setTimeout(next, 7000);
      }});
    } else { gsap.to(overlay, {opacity:0, duration:2, onComplete: endShow}); }
  }
  next();
}

function endShow() {
  showScreen('screen-credits'); const v = document.getElementById('nature-video'); v.style.display='block'; v.play(); gsap.to(v, {opacity:1, duration:3});
  document.getElementById('credits-text').classList.add('credits-scroll');
  document.getElementById('credits-text').innerText = "ROMISA'S UNIVERSE\n\nDeveloped by RAJ\n\nI Love You Forever ❤️";
  setInterval(() => {
    let l = document.createElement('div'); l.className = 'lantern'; l.style.left=Math.random()*90+'vw'; document.body.appendChild(l);
  }, 1200);
}
</script>
</body>
</html>
