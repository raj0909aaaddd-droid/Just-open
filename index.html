<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Romisa's 10-Minute Adventure 🌊🤖</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { overflow: hidden; background: #000; color: white; font-family: 'Georgia', serif; height: 100vh; width: 100vw; }
  
  /* 🌊 ULTRA-REALISTIC WATER */
  #water-bg { position: fixed; inset: 0; z-index: -2; background: linear-gradient(180deg, #001233 0%, #005f73 50%, #0a9396 100%); filter: url(#water-filter); opacity: 0.9; transform: scale(1.1); }
  .water-overlay { position: fixed; inset: 0; background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.1) 0%, #000 100%); z-index: -1; }
  
  /* 🎬 SCREENS & INTRO */
  .screen { display: none; position: absolute; inset: 0; flex-direction: column; align-items: center; justify-content: center; z-index: 10; opacity: 0; }
  #intro { position: fixed; inset: 0; z-index: 999; display: flex; align-items: center; justify-content: center; background: #000; }
  .nf-letter { font-size: 15vw; font-weight: 900; font-family: 'Arial Black', sans-serif; color: #e50914; opacity: 0; transform: scale(2.5); filter: blur(12px); text-shadow: 0 0 40px rgba(229,9,20,0.9); }

  /* 📱 GENERAL UI BOXES */
  .ui-box { background: rgba(0, 15, 30, 0.8); padding: 30px; border-radius: 25px; text-align: center; border: 2px solid rgba(10, 147, 150, 0.6); backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); width: 90%; max-width: 400px; }
  .btn { padding: 15px 25px; font-size: 18px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin: 10px; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #ff4d6d, #c9184a); color: white; box-shadow: 0 5px 20px rgba(255, 77, 109, 0.5); }
  .btn-primary:active { transform: scale(0.95); }
  .btn-dark { background: #333; color: #aaa; border: 1px solid #555; }
</style>
<style>
  /* 📖 3D DIARY */
  .book-container { perspective: 2500px; }
  .book { width: 320px; height: 450px; position: relative; transform-style: preserve-3d; transform: rotateX(15deg) rotateY(-5deg); box-shadow: 25px 25px 50px rgba(0,0,0,0.9); }
  .page { position: absolute; width: 100%; height: 100%; top: 0; right: 0; background: url('https://www.transparenttextures.com/patterns/paper-fibers.png'), #fffcf2; transform-origin: left; transition: transform 1.4s cubic-bezier(0.645, 0.045, 0.355, 1); border-radius: 5px 15px 15px 5px; padding: 40px 30px; font-size: 20px; color: #2c1e1e; font-style: italic; box-shadow: inset 8px 0 20px rgba(0,0,0,0.15); border: 1px solid #d4d4d4; display: flex; align-items: center; justify-content: center; text-align: center; }
  .page.flipped { transform: rotateY(-180deg); }
  .cover { background: url('https://www.transparenttextures.com/patterns/leather.png'), linear-gradient(135deg, #4a001f, #800040); color: #fcc419; font-weight: 900; font-size: 32px; border-left: 18px solid #2a0012; }

  /* 🦘 TRAMPOLINE GAME */
  #tramp-area { width: 100%; height: 300px; position: relative; overflow: hidden; background: rgba(0,0,0,0.5); border-radius: 15px; border: 2px dashed #0a9396; }
  #paddle { width: 100px; height: 20px; background: #ff4d6d; border-radius: 10px; position: absolute; bottom: 10px; left: 100px; box-shadow: 0 0 15px #ff4d6d; }
  #falling-bot { width: 40px; height: 40px; position: absolute; top: 0; left: 130px; font-size: 30px; }

  /* 🎬 MASSIVE FINALE TEXT & ROBOTS */
  #finale-stage { width: 100vw; height: 100vh; position: relative; perspective: 1500px; overflow: hidden;}
  /* MASSIVE TEXT STYLE */
  #love-text { position: absolute; right: -200vw; top: 30%; font-size: 18vw; font-weight: 900; color: #ff4d6d; text-shadow: 0 10px 40px rgba(255, 77, 109, 1); white-space: nowrap; transform: translateZ(50px); }
  
  .scene-bot { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 50; width: 100px; }
  .speech-bubble { position: absolute; top: -80px; background: #fff; color: #111; padding: 12px 18px; border-radius: 15px; font-size: 16px; font-weight: bold; white-space: nowrap; opacity: 0; box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 10; }
  .speech-bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: #fff transparent transparent transparent; }
  
  /* WiFi Glitch Loader */
  .loader { border: 8px solid rgba(255,255,255,0.1); border-top: 8px solid #ff4d6d; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
  </head>
  <body>
<svg style="display:none;"><filter id="water-filter"><feTurbulence type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="3" result="noise" id="turb"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="25" xChannelSelector="R" yChannelSelector="G"/></filter></svg>
<div id="water-bg"></div><div class="water-overlay"></div>
<audio id="bg-music" src="love.mp3" loop></audio>

<div id="intro"><div class="nf-letter">R</div><div class="nf-letter">O</div><div class="nf-letter">M</div><div class="nf-letter">I</div><div class="nf-letter">S</div><div class="nf-letter">A</div></div>

<div id="screen-snake" class="screen">
  <div class="ui-box">
    <h2 style="color:#0a9396;">Feed the Love! ❤️</h2><p style="color:#aaa; font-size:14px;">Swipe to eat 5 hearts</p>
    <canvas id="snake-canvas" width="300" height="300" style="background:#001233; border-radius:12px; margin-top:15px;"></canvas>
  </div>
</div>

<div id="screen-tramp" class="screen">
  <div class="ui-box">
    <h2 style="color:#ff4d6d;">Catch Clumsy Bot! 😱</h2><p style="color:#aaa; font-size:14px; margin-bottom:10px;">Drag the pink trampoline to bounce him 10 times!</p>
    <h3 id="bounce-score">Bounces: 0</h3>
    <div id="tramp-area"><div id="falling-bot">🤖</div><div id="paddle"></div></div>
  </div>
</div>

<div id="screen-lie" class="screen">
  <div class="ui-box">
    <h2 style="color:#e9d8a6;">🕵️‍♂️ The Lie Detector</h2>
    <div style="font-size: 50px; margin: 15px 0;" id="lie-bots">🤖 🤖</div>
    <h3 id="lie-question" style="margin-bottom: 20px;">Who is the real boss of the relationship?</h3>
    <button class="btn btn-primary" onclick="lieAnswer('Raj')">Raj 😎</button>
    <button class="btn btn-primary" onclick="lieAnswer('Romisa')">Romisa 👑</button>
  </div>
</div>
<div id="screen-glitch" class="screen">
  <div class="ui-box">
    <h2 style="color:red;">CONNECTION LOST</h2>
    <div class="loader"></div>
    <div style="position:relative; height: 100px; width: 100%; overflow:hidden;">
      <div id="glitch-clumsy" style="position:absolute; left:-100px; font-size:40px;">🤖🔨📶</div>
      <div id="glitch-main" style="position:absolute; left:-150px; font-size:40px;">🤖😡</div>
    </div>
    <p id="glitch-text" style="color:#aaa;">Buffering...</p>
  </div>
</div>

<div id="screen-diary" class="screen">
  <div class="book-container"><div class="book" id="diary-book"></div></div>
</div>

<div id="screen-finale" class="screen">
  <div id="finale-stage">
    <div id="love-text">I LOVE YOU ROMISA ❤️</div>
    
    <div class="scene-bot" id="main-bot" style="right: -200px; top: 40%;">
      <div class="speech-bubble" id="bubble-main"></div>
      <svg viewBox="0 0 100 130" width="100" height="130">
        <defs><linearGradient id="m-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#888"/></linearGradient></defs>
        <rect x="25" y="20" width="50" height="40" rx="10" fill="url(#m-grad)" stroke="#fff" stroke-width="2"/>
        <rect x="30" y="30" width="40" height="15" rx="5" fill="#000"/>
        <text id="face-main" x="50" y="42" fill="#0a9396" font-size="14" font-family="monospace" text-anchor="middle" font-weight="bold">^_^</text>
        <rect x="30" y="65" width="40" height="50" rx="10" fill="url(#m-grad)"/>
        <circle cx="20" cy="80" r="8" fill="#555"/><circle cx="80" cy="80" r="8" fill="#555"/>
      </svg>
    </div>
    
    <div class="scene-bot" id="clumsy-bot" style="left: 45%; top: -200px;">
      <div class="speech-bubble" id="bubble-clumsy"></div>
      <svg viewBox="0 0 100 130" width="100" height="130">
        <defs><linearGradient id="c-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffb703"/><stop offset="100%" stop-color="#fb8500"/></linearGradient></defs>
        <rect x="25" y="20" width="50" height="40" rx="10" fill="url(#c-grad)" stroke="#fff" stroke-width="2"/>
        <rect x="30" y="30" width="40" height="15" rx="5" fill="#000"/>
        <text id="face-clumsy" x="50" y="42" fill="#fff" font-size="14" font-family="monospace" text-anchor="middle" font-weight="bold">x_x</text>
        <rect x="25" y="65" width="50" height="45" rx="5" fill="url(#c-grad)"/>
        <rect x="15" y="80" width="10" height="30" fill="#333"/><rect x="75" y="80" width="10" height="30" fill="#333"/>
      </svg>
    </div>
  </div>
          </div>
   <script>
// 🌊 WATER ANIMATION
let turb = document.getElementById('turb'), freq = 0.01;
setInterval(() => { freq += 0.0004; turb.setAttribute('baseFrequency', `0.01 ${0.02 + Math.sin(freq)*0.015}`); }, 40);

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); const screen = document.getElementById(id); screen.style.display = 'flex'; gsap.to(screen, {opacity: 1, duration: 1}); }

// 🎬 INTRO
document.addEventListener('pointerdown', () => { document.getElementById('bg-music').play().catch(()=>{}); }, {once:true});
gsap.to('.nf-letter', {opacity:1, scale:1, filter:"blur(0px)", duration:1.2, stagger:0.2, ease:"power4.out"});
gsap.to('#intro', {opacity:0, duration:1.5, delay:4, onComplete: () => { document.getElementById('intro').style.display='none'; showScreen('screen-snake'); initSnake(); }});

// 🐍 SNAKE GAME
let sCanvas = document.getElementById('snake-canvas'), sCtx = sCanvas.getContext('2d');
let snake = [{x:150, y:150}], food = {x:105, y:105}, dx = 15, dy = 0, sScore = 0, sLoop;
function drawSnake() {
  sCtx.clearRect(0,0,300,300); sCtx.fillStyle = '#ff4d6d'; sCtx.font = "22px Arial"; sCtx.fillText("❤️", food.x-11, food.y+11);
  snake.forEach((p, i) => { sCtx.fillStyle = i===0 ? '#0a9396' : '#005f73'; sCtx.beginPath(); sCtx.arc(p.x, p.y, 8, 0, Math.PI*2); sCtx.fill(); });
  let head = {x: snake[0].x+dx, y: snake[0].y+dy};
  if(head.x<0) head.x=300; if(head.x>300) head.x=0; if(head.y<0) head.y=300; if(head.y>300) head.y=0;
  snake.unshift(head);
  if(Math.abs(head.x-food.x)<20 && Math.abs(head.y-food.y)<20) { sScore++; food = {x: Math.floor(Math.random()*16)*15+30, y: Math.floor(Math.random()*16)*15+30};
    if(sScore >= 5) { clearInterval(sLoop); gsap.to('#screen-snake', {opacity:0, duration:0.5, onComplete: () => { showScreen('screen-tramp'); initTramp(); }}); }
  } else snake.pop();
}
function initSnake() { sLoop = setInterval(drawSnake, 120); }
let tx, ty; sCanvas.addEventListener('touchstart', e => { e.preventDefault(); tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:false});
sCanvas.addEventListener('touchmove', e => { e.preventDefault(); if(!tx || !ty) return; let dxT = tx - e.touches[0].clientX, dyT = ty - e.touches[0].clientY;
  if(Math.abs(dxT)>Math.abs(dyT)){ if(dxT>0&&dx===0){dx=-15;dy=0;}else if(dxT<0&&dx===0){dx=15;dy=0;} }else{ if(dyT>0&&dy===0){dx=0;dy=-15;}else if(dyT<0&&dy===0){dx=0;dy=15;} } tx=null; ty=null; }, {passive:false});
// 🦘 TRAMPOLINE GAME
let tBot = document.getElementById('falling-bot'), paddle = document.getElementById('paddle'), trampArea = document.getElementById('tramp-area');
let bx = 130, by = 0, bdx = 3, bdy = 4, tScore = 0, tLoop, padX = 100;

function moveTramp() {
  bx += bdx; by += bdy;
  if(bx <= 0 || bx >= trampArea.offsetWidth - 40) bdx *= -1;
  // Hit Paddle
  if(by >= 250 && by <= 270 && bx + 40 >= padX && bx <= padX + 100) { bdy = -(Math.abs(bdy) + 0.5); tScore++; document.getElementById('bounce-score').innerText = "Bounces: " + tScore; }
  // Drop
  if(by > 300) { alert("SPLAT! 💥 Clumsy bot fell! Try again."); by = 0; bdy = 4; tScore = 0; document.getElementById('bounce-score').innerText = "Bounces: 0"; }
  // Win
  if(tScore >= 10) { clearInterval(tLoop); gsap.to('#screen-tramp', {opacity:0, duration:0.5, onComplete: () => { showScreen('screen-lie'); }}); }
  tBot.style.left = bx + 'px'; tBot.style.top = by + 'px';
}
function initTramp() { tLoop = setInterval(moveTramp, 20); }
trampArea.addEventListener('touchmove', e => { e.preventDefault(); let rect = trampArea.getBoundingClientRect(); padX = e.touches[0].clientX - rect.left - 50; if(padX<0) padX=0; if(padX>trampArea.offsetWidth-100) padX=trampArea.offsetWidth-100; paddle.style.left = padX + 'px'; }, {passive:false});

// 🕵️‍♂️ LIE DETECTOR
let lieStage = 0;
function lieAnswer(ans) {
  let bots = document.getElementById('lie-bots'); let q = document.getElementById('lie-question');
  if(lieStage === 0) {
    if(ans === 'Raj') { bots.innerText = "🤣 🤣"; q.innerText = "LIES! Clumsy bot is laughing on the floor!"; setTimeout(()=>{ bots.innerText="🤖 🤖"; q.innerText="Okay, try again. Who is the real boss?";}, 2500); } 
    else { bots.innerText = "🫡 🫡"; q.innerText = "TRUTH! The bots salute you, Queen Romisa!"; setTimeout(()=>{ lieStage=1; q.innerText="Who loves who more?"; }, 2500); }
  } else {
    if(ans === 'Romisa') { bots.innerText = "🚨 🚨"; q.innerText = "BEEP BEEP! ERROR! Raj loves you WAY more!"; setTimeout(()=>{ q.innerText="Try again! Who loves who more?";}, 2500); }
    else { bots.innerText = "❤️ ❤️"; q.innerText = "100% TRUTH! Raj's love is infinite."; setTimeout(()=>{ gsap.to('#screen-lie', {opacity:0, duration:0.5, onComplete: initGlitch}); }, 2000); }
  }
                           }
 // 📶 WIFI GLITCH SKIT
function initGlitch() {
  showScreen('screen-glitch');
  setTimeout(() => { document.getElementById('glitch-text').innerText = "Wait, Clumsy Bot... what are you doing?"; gsap.to('#glitch-clumsy', {left: '40%', duration: 2}); }, 2000);
  setTimeout(() => { document.getElementById('glitch-text').innerText = "HE BROKE THE ROUTER!"; gsap.to('#glitch-clumsy', {y: -20, yoyo: true, repeat: 3, duration: 0.2}); }, 4500);
  setTimeout(() => { document.getElementById('glitch-text').innerText = "Main Bot to the rescue!"; gsap.to('#glitch-main', {left: '50%', duration: 0.5}); }, 6000);
  setTimeout(() => { document.getElementById('glitch-text').innerText = "Get back here!"; gsap.to('#glitch-clumsy', {left: '120%', duration: 1}); gsap.to('#glitch-main', {left: '120%', duration: 1, delay: 0.2}); }, 7500);
  setTimeout(() => { gsap.to('#screen-glitch', {opacity:0, duration:0.5, onComplete: startDiary}); }, 9000);
}

// 📖 3D DIARY
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playPaperSound() { if(audioCtx.state === 'suspended') audioCtx.resume(); const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate); const data = buf.getChannelData(0); for(let i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * Math.sin(Math.PI * i / data.length) * 0.15; const src = audioCtx.createBufferSource(); src.buffer = buf; const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 800; src.connect(filter); filter.connect(audioCtx.destination); src.start(); }

function startDiary() {
  showScreen('screen-diary');
  const book = document.getElementById('diary-book');
  const pages = ["You survived the bots! 🤖", "But seriously, Romisa... 🌅", "My life is better with you in it. 🌍", "Distance is hard, but you are worth it. ⏳", "Every moment is a gift. ✨", "You are my dream. 🌙", "Turn the last page... 📖", "For the grand finale! 🎁"];
  pages.forEach((text, i) => { let page = document.createElement('div'); page.className = 'page'; page.style.zIndex = 10 - i; page.innerHTML = `<p>${text}</p>`;
    page.onclick = (e) => { e.stopPropagation(); page.classList.add('flipped'); playPaperSound(); if(i === 7) setTimeout(() => { gsap.to('#screen-diary', {opacity: 0, duration: 1, onComplete: startComedyFinale}); }, 1500); };
    book.appendChild(page); });
  let cover = document.createElement('div'); cover.className = 'page cover'; cover.style.zIndex = 20; cover.innerHTML = "Romisa's<br>Diary ⚜";
  cover.onclick = () => { cover.classList.add('flipped'); playPaperSound(); }; book.appendChild(cover);
}
     // 🎬 THE MASTERPIECE COMEDY FINALE
function setFace(id, face, color) { document.getElementById(`face-${id}`).textContent = face; if(color) document.getElementById(`face-${id}`).setAttribute('fill', color); }
function setSpeech(id, text) { const b = document.getElementById(`bubble-${id}`); b.innerText = text; gsap.to(b, {opacity: text ? 1 : 0, duration: 0.3}); }

function startComedyFinale() {
  showScreen('screen-finale');
  const tl = gsap.timeline();
  
  // 1. MASSIVE TEXT slides in from off-screen right to fill the background
  tl.to('#love-text', {right: '10vw', duration: 4, ease: "power2.out"})
    
  // 2. Main Bot (Realistic) walks in
    .to('#main-bot', {right: '35%', duration: 2, ease: "power2.out"}, "-=3")
    
  // 3. Clumsy Bot FALLS from the sky!
    .to('#clumsy-bot', {top: '40%', duration: 0.8, ease: "bounce.out"}, "+=1")
    .add(() => setFace('clumsy', 'X_X'))
    
  // 4. Clumsy Bot speaks
    .add(() => setSpeech('clumsy', "Sorry Romisa I fall accident 🤕"))
    
  // 5. Main Bot gets angry (LED Eyes turn RED)
    .add(() => { setFace('main', '>_<', '#ff0000'); setSpeech('main', "Stupid come here! 😡"); }, "+=2.5")
    
  // 6. THE SLAP!
    .to('#main-bot', {right: '42%', duration: 0.4, ease: "power2.in"}, "+=1") // Approaches
    .to('#main-bot', {rotation: -25, duration: 0.1, yoyo: true, repeat: 1}) // Slap motion
    .to('#clumsy-bot', {x: -40, rotation: -20, duration: 0.1, yoyo: true, repeat: 1}, "<") // Impact
    
  // 7. The Punishment
    .add(() => setSpeech('main', "Go the corner and sit! 👉"))
    
  // 8. Clumsy Bot walks away
    .add(() => setSpeech('clumsy', '')) // Hide bubble
    .to('#clumsy-bot', {left: '5%', top: '75%', duration: 2, ease: "power1.inOut"}, "+=1.5") // Walks to corner
    .to('#clumsy-bot', {scaleY: 0.4, transformOrigin: "bottom center", duration: 0.5}) // Sits down
    
  // 9. Main Bot looks at screen, eyes turn friendly blue, and apologizes
    .to('#main-bot', {rotation: 0, right: '50%', x: '50%', duration: 1.5, ease: "power2.out"})
    .add(() => setSpeech('main', ''))
    .add(() => { setFace('main', '^_^', '#0a9396'); setSpeech('main', "Romisa, sorry for my friend 😅❤️"); }, "+=0.5");
}
</script>
</body>
</html>
