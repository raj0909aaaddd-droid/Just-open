<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Romisa's Special Letter 🌊💌</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { overflow: hidden; background: #000; color: white; font-family: 'Georgia', serif; height: 100vh; width: 100vw; perspective: 1200px; }
  
  /* 🌊 BACKGROUND LAYERS */
  #water-bg { position: fixed; inset: 0; z-index: -3; background: linear-gradient(180deg, #001233 0%, #005f73 50%, #0a9396 100%); filter: url(#water-filter); opacity: 0.95; }
  .water-overlay { position: fixed; inset: 0; background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.1) 0%, #000 100%); z-index: -2; }
  #nature-video { display: none; position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -4; opacity: 0; }

  /* 🎬 GLOBAL UI */
  .screen { display: none; position: absolute; inset: 0; flex-direction: column; align-items: center; justify-content: center; z-index: 10; opacity: 0; }
  .ui-box { background: rgba(0, 15, 30, 0.8); padding: 25px; border-radius: 25px; text-align: center; border: 2px solid rgba(10, 147, 150, 0.6); backdrop-filter: blur(15px); width: 90%; max-width: 400px; }
  .btn { padding: 15px 25px; font-size: 18px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin: 10px; }
  .btn-primary { background: linear-gradient(135deg, #ff4d6d, #c9184a); color: white; box-shadow: 0 5px 20px rgba(255, 77, 109, 0.5); }
    /* 🤖 SPEECH BUBBLES */
  .speech-bubble { 
      position: absolute; top: -65px; background: #fff; color: #111; 
      padding: 10px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; 
      opacity: 0; box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 10; 
      white-space: normal; max-width: 140px; text-align: center; line-height: 1.3;
  }
  .speech-bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: #fff transparent transparent transparent; }

  /* 🔥 JETPACK FIRE */
  .thruster {
      width: 24px; height: 40px;
      background: linear-gradient(to bottom, #fff 0%, #ffdd00 20%, #ff3300 80%, transparent 100%);
      border-radius: 50% 50% 20% 20%; position: absolute; bottom: -30px; left: 38px;
      animation: flicker 0.1s infinite alternate; display: none; filter: blur(2px); box-shadow: 0 0 20px #ff3300;
  }
  @keyframes flicker { 0% { opacity: 0.8; height: 35px; transform: scaleX(0.9); } 100% { opacity: 1; height: 45px; transform: scaleX(1.1); } }
  .scene-bot { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 50; width: 100px; }
    /* 📜 REALISTIC PAPER LETTER */
  #paper-letter { 
      position: absolute; bottom: -100vh; width: 85%; max-width: 400px; 
      min-height: 300px; background: #fffcf2; padding: 40px 25px; 
      box-shadow: 0 10px 50px rgba(0,0,0,0.8); border-radius: 2px;
      color: #2c1e1e; font-family: 'Courier New', monospace; font-size: 18px;
      text-align: center; z-index: 60; border: 1px solid #d4d4d4;
      background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
  }
  #paper-letter::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: rgba(255,0,0,0.1); border-left: 1px solid rgba(255,0,0,0.2); }

  /* 🏮 CREDITS & LANTERNS */
  #screen-credits { background: transparent; overflow: hidden; }
  .lantern { position: absolute; bottom: -100px; width: 40px; height: 60px; background: rgba(255, 165, 0, 0.8); border-radius: 10px; box-shadow: 0 0 20px gold; animation: floatL 25s linear forwards; }
  @keyframes floatL { to { transform: translateY(-110vh) translateX(40px); opacity: 0; } }
  
  #credits-text { position: absolute; top: 100%; width: 100%; text-align: center; color: #fcc419; font-size: 22px; line-height: 2.8; text-shadow: 0 0 15px gold; white-space: pre-line; z-index: 10; font-weight: bold; }
  .credits-scroll { animation: scrollUp 45s linear forwards; }
  @keyframes scrollUp { to { top: -250%; } }
</style>
</head>
<body>
<svg style="display:none;"><filter id="water-filter"><feTurbulence type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="3" result="noise" id="turb"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="25" xChannelSelector="R" yChannelSelector="G"/></filter></svg>
<div id="water-bg"></div><div class="water-overlay"></div>
<video id="nature-video" src="https://cdn.pixabay.com/video/2020/05/14/38894-420790924_large.mp4" loop muted playsinline></video>
<audio id="bg-music" src="love.mp3" loop></audio>

<div id="screen-password" class="screen" style="display:flex; opacity:1;">
  <div class="ui-box">
    <h2 style="color:#0a9396; font-family:monospace;">SYSTEM LOCKED</h2>
    <input type="text" id="security-input" placeholder="PASSCODE" style="width:80%; padding:10px; margin:20px; text-align:center;">
    <button class="btn btn-primary" onclick="checkPassword()">UNLOCK</button>
  </div>
</div>

<div id="intro" style="display:none;"><div class="nf-letter">R</div><div class="nf-letter">O</div><div class="nf-letter">M</div><div class="nf-letter">I</div><div class="nf-letter">S</div><div class="nf-letter">A</div></div>

<div id="screen-glitch" class="screen">
  <div class="ui-box">
    <h2 style="color:red;">CONNECTION LOST</h2>
    <div style="border:5px solid #333; border-top:5px solid red; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto;"></div>
    <div style="position:relative; height:100px;">
      <div id="glitch-bot" style="position:absolute; left:-50px; font-size:40px;">🤖🔨</div>
    </div>
    <p id="glitch-text">10 Seconds to Repair...</p>
  </div>
</div>
<div id="screen-finale" class="screen">
  <div id="finale-stage">
    <div id="love-text" style="position:absolute; top:20%; width:100%; text-align:center; font-size:40px; color:#ff4d6d; text-shadow:0 0 20px red; right:-200vw; font-weight:900;">I LOVE YOU<br>ROMISA ❤️</div>
    
    <div class="scene-bot" id="main-bot" style="right:-200px; top:45%;">
      <div class="speech-bubble" id="bubble-main"></div>
      <svg viewBox="0 0 100 130" width="100" height="130"><rect x="25" y="20" width="50" height="40" rx="10" fill="#888" stroke="#fff"/><text id="face-main" x="50" y="42" fill="#0a9396" font-size="14" font-weight="bold" text-anchor="middle">^_^</text><rect x="30" y="65" width="40" height="50" rx="10" fill="#ccc"/></svg>
      <div class="thruster" id="main-fire"></div>
    </div>

    <div class="scene-bot" id="raj-bot" style="right:50%; top:-300px;">
      <div class="speech-bubble" id="bubble-raj"></div>
      <svg viewBox="0 0 100 130" width="100" height="130"><rect x="25" y="20" width="50" height="40" rx="10" fill="#00b4d8" stroke="#fff"/><text id="face-raj" x="50" y="42" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">O_O</text><rect x="25" y="65" width="50" height="45" rx="5" fill="#023e8a"/></svg>
    </div>

    <div class="scene-bot" id="clumsy-bot" style="left:45%; top:-200px;"><div class="speech-bubble" id="bubble-clumsy"></div><svg id="svg-clumsy" viewBox="0 0 100 130" width="100" height="130"><rect x="25" y="20" width="50" height="40" rx="10" fill="#fb8500" stroke="#fff"/><text id="face-clumsy" x="50" y="42" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">x_x</text><rect x="25" y="65" width="50" height="45" rx="5" fill="#fca311"/></svg></div>

    <div id="paper-letter">
        <p style="margin-top: 20px;">Dearest Romisa,</p><br>
        <p style="font-size: 16px;">I hope you are doing good today. I wanted to make something that shows how special you are to me.</p><br>
        <p>I built this entire world just for you. ❤️</p>
    </div>
  </div>
</div>

<div id="screen-credits" class="screen"><div id="credits-text"></div></div>
<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSFX(f, d, t='sine') {
  if(audioCtx.state === 'suspended') audioCtx.resume();
  let o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = t; o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(f, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
  o.start(); o.stop(audioCtx.currentTime + d);
}

function showScreen(id) { 
  document.querySelectorAll('.screen').forEach(s => {s.style.display='none'; s.style.opacity='0';});
  let s = document.getElementById(id); s.style.display='flex'; gsap.to(s, {opacity: 1, duration: 1}); 
}

function checkPassword() {
  if(document.getElementById('security-input').value.toLowerCase() === 'romisa') {
    document.getElementById('bg-music').play();
    showScreen('screen-glitch'); initRepair();
  }
}

function initRepair() {
  let time = 10;
  let iv = setInterval(() => {
    time--; document.getElementById('glitch-text').innerText = `${time} Seconds to Repair...`;
    playSFX(200, 0.1, 'square');
    if(time <= 0) { clearInterval(iv); startIntro(); }
  }, 1000);
  gsap.to('#glitch-bot', {left:'40%', duration:2, yoyo:true, repeat:-1});
}

function startIntro() {
  showScreen('intro'); 
  gsap.to('.nf-letter', {opacity:1, scale:1, filter:"blur(0px)", duration:1.5, stagger:0.2});
  setTimeout(startComedyFinale, 5000);
}
 function setFace(id, f, c) { document.getElementById(`face-${id}`).textContent=f; if(c) document.getElementById(`face-${id}`).setAttribute('fill',c); }
function setSpeech(id, t) { const b=document.getElementById(`bubble-${id}`); b.innerText=t; gsap.to(b, {opacity:t?1:0, duration:0.3}); }

function startComedyFinale() {
  showScreen('screen-finale');
  const tl = gsap.timeline();
  tl.to('#love-text', {right:'0vw', duration:3})
    .to('#main-bot', {right:'35%', duration:2}, "-=1")
    .to('#clumsy-bot', {top:'40%', duration:0.8, ease:"bounce.out"})
    .add(() => { setFace('clumsy','X_X'); playSFX(100, 0.5); setSpeech('clumsy',"Sorry! 🤕"); })
    .add(() => { setFace('main', '>_<', '#ff0000'); setSpeech('main',"Stupid! 😡"); }, "+=2.5")
    .to('#main-bot', {right:'42%', duration:0.4, ease:"power2.in"})
    .add(() => playSFX(800, 0.1, 'square')) 
    .to('#clumsy-bot', {x:-40, rotation:-20, duration:0.1, yoyo:true, repeat:1})
    .to('#clumsy-bot', {left:'5%', top:'80%', duration:2}, "+=1.5")
    .to('#main-bot', {right:'50%', x:'50%', duration:1})
    .add(() => { document.getElementById('main-fire').style.display='block'; playSFX(50, 5, 'sawtooth'); })
    .to('#main-bot', {top:'-300px', duration:5}) // 5s Flight Up
    .to('#main-bot', {top:'40%', right:'35%', duration:5}, "+=1") // 5s Flight Down
    .to('#raj-bot', {top:'45%', right:'55%', duration:5}, "<")
    .add(() => { document.getElementById('main-fire').style.display='none'; setFace('raj','>///<','#ff4da6'); setSpeech('raj',"Ro-ro-romisa... 😳"); })
    .add(() => { setSpeech('raj', "I love you! ❤️"); startLetterReveal(); }, "+=4");
  }
 function startLetterReveal() {
  const tl = gsap.timeline();
  // Bots look at the bottom of the screen
  tl.add(() => { 
      setSpeech('raj', ''); 
      setFace('clumsy', 'O_O', '#fff'); setSpeech('clumsy', "Look what I found!"); 
  })
  .to('#clumsy-bot', {left: '30%', top: '50%', duration: 1.5})
  
  // They pull the paper up!
  .to('#paper-letter', {bottom: '20%', duration: 2, ease: "back.out(1.2)"})
  .add(() => playSFX(400, 0.5)) // Paper sound
  
  // Transition to Nature Video & Music
  .add(() => {
      const vid = document.getElementById('nature-video');
      vid.style.display = 'block'; vid.play();
      gsap.to(vid, {opacity: 1, duration: 4});
      gsap.to('#water-bg', {opacity: 0, duration: 4});
      
      // All bots say goodbye
      setSpeech('clumsy', "Enjoy the view! 🌿");
      setSpeech('main', "We hope you liked it! ❤️");
      setSpeech('raj', "Forever yours. ✨");
  }, "+=4")
  
  // Start Credits
  .to(['#paper-letter', '.scene-bot', '#love-text'], {opacity: 0, duration: 2, delay: 6})
  .add(endShow);
}

function endShow() {
  showScreen('screen-credits');
  const c = document.getElementById('credits-text');
  c.classList.add('credits-scroll');
  c.innerText = "ROMISA'S UNIVERSE\n\nDeveloped by RAJ\n\nNature View: Forest Stream\n\nMusic: love.mp3\n\nI Love You Forever ❤️";
  
  setInterval(() => {
    let l = document.createElement('div'); l.className = 'lantern';
    l.style.left = Math.random() * 90 + 'vw';
    l.style.animationDuration = Math.random()*10+15+'s'; document.body.appendChild(l);
    setTimeout(() => l.remove(), 25000);
  }, 1200);
}
</script>
</body>
</html>
