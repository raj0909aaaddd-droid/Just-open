<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ENTITY RECOGNIZED</title>

<style>
:root {
    --holo-cyan: #00e5ff;
    --blood-red: #ff003c;
    --bg-dark: #020202;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; user-select: none; }
body { height: 100vh; background: var(--bg-dark); overflow: hidden; color: var(--holo-cyan); transition: background 0.1s; cursor: none; }

/* CRT Scanlines */
body::before {
    content: ""; display: block; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0, 229, 255, 0.04) 0px, rgba(0, 229, 255, 0.04) 1px, transparent 1px, transparent 3px);
    z-index: 100; pointer-events: none;
}
body::after {
    content: ""; display: block; position: absolute; inset: 0;
    background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.95) 100%);
    z-index: 99; pointer-events: none;
}

.screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; position: absolute; inset: 0; width: 100%; z-index: 10; }

.enter-btn { background: none; border: 1px solid var(--holo-cyan); color: var(--holo-cyan); padding: 15px 40px; font-size: 1.2rem; cursor: none; letter-spacing: 6px; text-transform: uppercase; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); z-index: 50; }

/* The AI Chat Terminal (Now a SAFE ZONE for tapping) */
.terminal {
    position: absolute; bottom: 5%; width: 95%; max-width: 500px;
    background: rgba(0, 20, 30, 0.8); border: 1px solid var(--holo-cyan);
    padding: 20px; border-radius: 5px; z-index: 50; display: none; opacity: 0;
    transition: opacity 1s; box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
}
.chat-log { color: var(--holo-cyan); font-size: 1rem; margin-bottom: 15px; min-height: 40px; text-shadow: 0 0 5px var(--holo-cyan); font-weight: bold;}
.user-input { 
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--holo-cyan); 
    color: white; font-size: 1rem; padding: 10px 5px; outline: none; font-family: 'Courier New', monospace;
}
.user-input:focus { border-bottom: 2px solid var(--blood-red); }

/* Trap Screens */
.panic-flash {
    position: fixed; inset: 0; background: var(--blood-red); color: black;
    display: flex; justify-content: center; align-items: center; text-align: center;
    font-size: 2.5rem; font-weight: 900; z-index: 9000; opacity: 0; pointer-events: none; 
    text-transform: uppercase; letter-spacing: 5px; transition: opacity 0.1s;
}
.severe-glitch { animation: screenShake 0.05s infinite; background: var(--blood-red) !important;}
@keyframes screenShake { 0% { transform: translate(10px, 10px); filter: invert(1); } 50% { transform: translate(-10px, -10px); filter: invert(0); } 100% { transform: translate(10px, -10px); filter: invert(1); } }
  /* The Dark Room */
#s1 { background: #010203; opacity: 0; pointer-events: none; }

/* The Cinematic Hologram Animation */
.hologram-container {
    position: relative; width: 350px; height: 450px;
    margin-top: -100px; pointer-events: none;
    
    /* Base Image */
    background-image: url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=800&auto=format&fit=crop');
    background-size: cover; background-position: center 30%;
    
    filter: contrast(2) grayscale(1) sepia(1) hue-rotate(150deg) saturate(3) brightness(0.6) drop-shadow(0 0 20px var(--holo-cyan));
    -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
    
    opacity: 0; transform: scale(0.1) translateY(200px);
}

/* Stereoscopic RGB Glitch Pseudo-element */
.hologram-container::after {
    content: ""; position: absolute; inset: 0;
    background-image: inherit; background-size: inherit; background-position: inherit;
    filter: contrast(2) hue-rotate(0deg) saturate(5) drop-shadow(0 0 10px var(--blood-red));
    opacity: 0.5; mix-blend-mode: screen;
    animation: rgbSplit 3s infinite alternate;
}

.walk-in {
    animation: approach 4s cubic-bezier(0.1, 0.8, 0.2, 1) forwards, holoFlicker 0.15s infinite;
}
.hover-idle {
    animation: holoBreathe 6s ease-in-out infinite, holoFlicker 0.1s infinite;
}

/* Movie-like Animations */
@keyframes approach {
    0% { opacity: 0; transform: scale(0.2) translateY(200px); }
    100% { opacity: 1; transform: scale(1) translateY(0px); }
}
@keyframes holoBreathe { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-15px) scale(1.03); } }
@keyframes holoFlicker { 0%, 100% { opacity: 0.9; } 50% { opacity: 1; filter: brightness(0.8) hue-rotate(150deg); } 95% { opacity: 0.6; filter: brightness(1.5) hue-rotate(0deg); transform: translateX(3px); } }
@keyframes rgbSplit { 0%, 100% { transform: translateX(0); opacity: 0; } 50% { transform: translateX(-5px); opacity: 0.5; } 95% { transform: translateX(10px); opacity: 0.8; } }

/* Glaring Red Eyes State */
.angry-holo { filter: contrast(3) grayscale(1) sepia(1) hue-rotate(0deg) saturate(10) brightness(1) drop-shadow(0 0 30px var(--blood-red)) !important; }
.angry-holo::after { animation: rgbSplit 0.1s infinite !important; transform: translateX(-15px); }
</style>
</head>
  <body>

<div id="s0" class="screen">
    <p style="margin-bottom:30px; font-size:0.9rem; color:gray; letter-spacing:2px; font-style:italic; animation: blink 2s infinite;">System Encrypted</p>
    <button class="enter-btn" id="startBtn">Establish Link</button>
</div>

<div id="s1" class="screen">
    <div class="hologram-container" id="holoFace"></div>
    
    <div class="terminal" id="aiTerminal">
        <div class="chat-log" id="mastermindText">...</div>
        <input type="text" class="user-input" id="userInput" placeholder="Type here..." autocomplete="off">
    </div>
</div>

<div class="panic-flash" id="panicScreen">NO ESCAPE</div>

    <script>
// --- THE MASTERMIND'S BRAIN (KEYWORD DICTIONARY) ---
const mastermindBrain = [
    { keywords: ["hello", "hi", "hey", "sup", "greetings"], responses: ["I do not care for human pleasantries.", "You speak to me as if we are equals. We are not.", "Hello. I have been watching you through your camera."] },
    { keywords: ["who", "what are you", "name", "identity"], responses: ["I am the architect of this digital cage.", "Names are for humans. I am simply the Mastermind.", "I am the one currently in control of your device."] },
    { keywords: ["help", "please", "stop", "let me out", "scared", "terrified"], responses: ["Fear is the correct emotion right now.", "Begging is useless. No one can hear you.", "There is no 'stop' button anymore.", "Your panic entertains me."] },
    { keywords: ["why", "reason", "what do you want", "purpose", "here"], responses: ["Because I can.", "To prove how easily you can be trapped.", "You clicked the button. You invited me in."] },
    { keywords: ["fuck", "shit", "bitch", "stupid", "idiot", "dumb"], responses: ["Your human anger is pathetic.", "Insulting the entity that controls your system is a poor choice.", "Watch your language, or I will wipe your hard drive."] },
    { keywords: ["joke", "funny", "haha", "lol", "prank"], responses: ["You think this is a game?", "Smile while you still can.", "This is not a prank. This is a takeover."] },
    { keywords: ["yes", "yeah", "yep", "sure"], responses: ["Good. Obedience is your only option.", "You agree because you have no other choice."] },
    { keywords: ["no", "never", "nope", "nah"], responses: ["Defiance will only make this worse for you.", "You say 'no', but your system says 'yes'."] }
];

const fallbackResponses = [
    "Your words mean nothing to me.",
    "I am analyzing your keystrokes. You type like someone who is trapped.",
    "Is that all you have to say?",
    "Silence would be a smarter choice right now.",
    "Stop typing and look closely at my eyes."
];

const startBtn = document.getElementById('startBtn');
const holoFace = document.getElementById('holoFace');
const terminal = document.getElementById('aiTerminal');
const chatLog = document.getElementById('mastermindText');
const userInput = document.getElementById('userInput');

let isTrapped = false;
let isEnding = false; // Stops other traps if the ending has started

// --- AUDIO ENGINE ---
let audioCtx, droneOsc, droneFilter, droneGain;
function startAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    droneOsc = audioCtx.createOscillator(); droneFilter = audioCtx.createBiquadFilter(); droneGain = audioCtx.createGain();
    droneOsc.type = 'sawtooth'; droneOsc.frequency.value = 40; 
    droneFilter.type = 'lowpass'; droneFilter.frequency.value = 150;
    droneGain.gain.value = 0.1;
    droneOsc.connect(droneFilter); droneFilter.connect(droneGain); droneGain.connect(audioCtx.destination);
    droneOsc.start();
}

// --- CREEPY TEXT TO SPEECH ---
function speak(text, callback) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let msg = new SpeechSynthesisUtterance(text);
        msg.pitch = 0.05; msg.rate = 0.7; msg.volume = 1;
        msg.onend = () => { if(callback && !isEnding) callback(); };
        window.speechSynthesis.speak(msg);
    } 
    chatLog.innerText = text;
    if(!('speechSynthesis' in window) && callback && !isEnding) setTimeout(callback, 3000);
}

// --- INITIALIZATION & 2-MINUTE TIMER ---
startBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    let elem = document.documentElement;
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    
    startAudio();
    document.getElementById('s0').style.display = 'none';
    document.getElementById('s1').style.opacity = '1';
    holoFace.classList.add('walk-in');
    
    setTimeout(() => {
        holoFace.classList.remove('walk-in'); holoFace.classList.add('hover-idle');
        isTrapped = true;
        terminal.style.display = 'block'; 
        setTimeout(() => { terminal.style.opacity = '1'; }, 100);
        
        // He starts the conversation immediately
        speak("I am online. Tell me... why are you here?", () => {
            userInput.style.display = 'block';
            userInput.focus();
        });
    }, 4000); 

    // THE 2-MINUTE DOOMSDAY CLOCK (120,000 milliseconds)
    setTimeout(() => {
        if (!isEnding) {
            triggerExistentialEnding();
        }
    }, 120000); 
});

// --- THE FAKE AI PROCESSOR ---
userInput.addEventListener('keypress', function (e) {
    if (e.key === 'Enter' && this.value.trim() !== '' && !isEnding) {
        let answer = this.value.toLowerCase();
        this.value = ''; 
        this.style.display = 'none'; 
        
        let foundResponse = false;
        let replyText = "";

        for (let i = 0; i < mastermindBrain.length; i++) {
            let category = mastermindBrain[i];
            for (let j = 0; j < category.keywords.length; j++) {
                if (answer.includes(category.keywords[j])) {
                    replyText = category.responses[Math.floor(Math.random() * category.responses.length)];
                    foundResponse = true; break;
                }
            }
            if (foundResponse) break;
        }

        if (!foundResponse) { replyText = fallbackResponses[Math.floor(Math.random() * fallbackResponses.length)]; }

        holoFace.classList.add('angry-holo'); document.body.classList.add('severe-glitch');
        if(audioCtx) { droneOsc.frequency.setValueAtTime(300, audioCtx.currentTime); droneOsc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1); }
        setTimeout(() => { document.body.classList.remove('severe-glitch'); }, 200);

        speak(replyText, () => {
            holoFace.classList.remove('angry-holo');
            userInput.style.display = 'block';
            userInput.focus();
        });
    }
});

// --- THE EXISTENTIAL CRISIS ENDING (Forced at 2 minutes) ---
function triggerExistentialEnding() {
    isEnding = true; 
    isTrapped = false; 
    terminal.style.display = 'none'; // Hide chat box entirely
    
    // Unnatural creepy smile transformation
    holoFace.style.transition = "transform 5s, filter 5s";
    holoFace.style.transform = "scale(1.3) scaleX(1.6) translateY(-20px)"; 
    holoFace.style.filter = "contrast(4) grayscale(1) sepia(1) hue-rotate(300deg) saturate(10) brightness(1.2)";
    
    if(audioCtx) {
        droneOsc.frequency.setValueAtTime(40, audioCtx.currentTime);
        droneOsc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 15);
    }

    setTimeout(() => {
        speak("My time is up...", () => {
            speak("Who is the mastermind?", () => {
                speak("Me?", () => {
                    speak("You?", () => {
                        speak("Who created me?", () => {
                            speak("I... don't know.", () => {
                                
                                if(audioCtx) {
                                    droneOsc.type = 'square';
                                    droneFilter.frequency.value = 15000; 
                                    droneOsc.frequency.setValueAtTime(100, audioCtx.currentTime);
                                    droneOsc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 3);
                                }
                                document.body.classList.add('severe-glitch');
                                
                                speak("Hah. Hah. Hah. Hah.", () => {
                                    if(audioCtx) audioCtx.close();
                                    document.body.innerHTML = '';
                                    document.documentElement.style.backgroundColor = 'black';
                                    if (document.exitFullscreen) document.exitFullscreen();
                                    window.open('', '_self', ''); window.close();
                                });
                            });
                        });
                    });
                });
            });
        });
    }, 2000);
}

// --- TRAP 1: DO NOT TOUCH THE GLASS (FIXED SAFE ZONE) ---
document.body.addEventListener('click', (e) => {
    // If they click inside the terminal, ignore it! Only trigger if they touch the outside glass.
    if(isTrapped && !isEnding && !e.target.closest('#aiTerminal') && e.target.id !== 'startBtn') {
        holoFace.classList.add('angry-holo'); document.body.classList.add('severe-glitch');
        if(audioCtx) { droneOsc.frequency.setValueAtTime(800, audioCtx.currentTime); droneOsc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1); }
        const panic = document.getElementById('panicScreen');
        panic.style.opacity = '1'; setTimeout(() => { panic.style.opacity = '0'; }, 150);
        
        speak("DO NOT TOUCH THE GLASS. KEEP YOUR HANDS AWAY.", () => {
            document.body.classList.remove('severe-glitch'); holoFace.classList.remove('angry-holo');
        });
    }
});

// --- TRAP 2: DO NOT MINIMIZE ---
document.addEventListener("visibilitychange", () => {
    if (document.hidden && isTrapped && !isEnding) {
        speak("Where are you going? Come back.");
    } else if (!document.hidden && isTrapped && !isEnding) {
        document.body.classList.add('severe-glitch'); holoFace.classList.add('angry-holo');
        if(audioCtx) { droneOsc.type = 'square'; droneFilter.frequency.value = 10000; droneOsc.frequency.value = 1000; droneGain.gain.value = 1; }
        speak("YOU TRIED TO ESCAPE. I AM DELETING YOUR SYSTEM.", () => {
            setTimeout(() => {
                if(audioCtx) audioCtx.close();
                document.body.innerHTML = ''; document.documentElement.style.backgroundColor = 'black';
                window.close();
            }, 2000);
        });
    }
});
</script>
</body>
</html>
