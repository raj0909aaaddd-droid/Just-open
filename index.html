<!DOCTYPE html>
<html lang="en">
<head>

<title>Romisa — A Multiverse Story</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #f0c060; --gold-glow: rgba(240,192,96,0.35); --pink: #e879a0;
    --cyan: #60d8f0; --violet: #a78bfa; --glass-bg: rgba(8,4,20,0.72);
    --glass-border: rgba(255,255,255,0.12); --text-primary: #f0eaf8;
    --text-secondary: rgba(240,234,248,0.7);
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: #020008; font-family: 'Georgia', serif; color: var(--text-primary); user-select: none; }

  /* ─── GALAXY MAP ─── */
  #galaxy-map { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; transform-origin: center center; will-change: transform; }
  #deep-space { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 30% 40%, rgba(80,20,120,0.28) 0%, transparent 70%), radial-gradient(ellipse 60% 80% at 70% 65%, rgba(20,60,120,0.22) 0%, transparent 65%), radial-gradient(ellipse 100% 100% at 50% 50%, rgba(6,0,18,1) 0%, #020008 100%); }
  #star-field-1, #star-field-2, #star-field-3 { position: absolute; inset: 0; }
  .nebula-wisp { position: absolute; border-radius: 50%; filter: blur(60px); animation: wisp-drift linear infinite; pointer-events: none; will-change: transform, opacity; }
  @keyframes wisp-drift { 0% { transform: translate(0, 0) scale(1); opacity: 0.18; } 30% { opacity: 0.32; } 60% { transform: translate(var(--tx), var(--ty)) scale(1.08); opacity: 0.22; } 100% { transform: translate(0, 0) scale(1); opacity: 0.18; } }
  #galaxy-title { position: absolute; top: clamp(24px, 5vh, 60px); left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; z-index: 10; }
  #galaxy-title h1 { font-size: clamp(22px, 4.5vw, 42px); font-weight: normal; letter-spacing: 0.18em; color: var(--gold); text-shadow: 0 0 40px rgba(240,192,96,0.6), 0 0 80px rgba(240,192,96,0.2); animation: title-pulse 4s ease-in-out infinite; }
  #galaxy-title p { margin-top: 8px; font-size: clamp(12px, 2vw, 15px); letter-spacing: 0.3em; color: var(--text-secondary); font-family: 'Courier New', monospace; text-transform: uppercase; }
  @keyframes title-pulse { 0%, 100% { text-shadow: 0 0 40px rgba(240,192,96,0.6), 0 0 80px rgba(240,192,96,0.2); } 50% { text-shadow: 0 0 60px rgba(240,192,96,0.9), 0 0 120px rgba(240,192,96,0.35); } }
    /* ─── CHAPTER STARS ─── */
  .chapter-star { position: absolute; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; z-index: 20; }
  .star-orb { width: clamp(52px, 7vw, 72px); height: clamp(52px, 7vw, 72px); border-radius: 50%; position: relative; transition: transform 0.3s ease; }
  .star-orb::before { content: ''; position: absolute; inset: -2px; border-radius: 50%; animation: orb-rotate 8s linear infinite; opacity: 0.6; }
  .star-orb::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; filter: blur(6px); opacity: 0.7; animation: inner-pulse 2.5s ease-in-out infinite; }
  @keyframes orb-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes inner-pulse { 0%, 100% { opacity: 0.5; transform: scale(0.85); } 50% { opacity: 0.9; transform: scale(1); } }
  .star-ch1 .star-orb { background: radial-gradient(circle at 35% 35%, #ffd080, #e07820 60%, #80300a); box-shadow: 0 0 24px rgba(224,120,32,0.7), 0 0 60px rgba(224,120,32,0.3); } .star-ch1 .star-orb::before { background: conic-gradient(transparent 60%, rgba(255,200,80,0.5), transparent); border: 1px solid rgba(255,180,60,0.4); } .star-ch1 .star-orb::after { background: radial-gradient(circle, #ffe0a0, transparent); }
  .star-ch2 .star-orb { background: radial-gradient(circle at 35% 35%, #a0e8ff, #2080d0 60%, #081060); box-shadow: 0 0 24px rgba(32,128,208,0.8), 0 0 60px rgba(32,128,208,0.3); } .star-ch2 .star-orb::before { background: conic-gradient(transparent 60%, rgba(96,216,240,0.5), transparent); border: 1px solid rgba(96,216,240,0.4); } .star-ch2 .star-orb::after { background: radial-gradient(circle, #80d8ff, transparent); }
  .star-ch3 .star-orb { background: radial-gradient(circle at 35% 35%, #e0a0ff, #a030d0 60%, #300860); box-shadow: 0 0 24px rgba(160,48,208,0.8), 0 0 60px rgba(160,48,208,0.3); } .star-ch3 .star-orb::before { background: conic-gradient(transparent 60%, rgba(167,139,250,0.5), transparent); border: 1px solid rgba(167,139,250,0.4); } .star-ch3 .star-orb::after { background: radial-gradient(circle, #d0a0ff, transparent); }
  .star-ch4 .star-orb { background: radial-gradient(circle at 35% 35%, #a0ffb8, #18c060 60%, #044020); box-shadow: 0 0 24px rgba(24,192,96,0.8), 0 0 60px rgba(24,192,96,0.3); } .star-ch4 .star-orb::before { background: conic-gradient(transparent 60%, rgba(120,255,160,0.5), transparent); border: 1px solid rgba(120,255,160,0.4); } .star-ch4 .star-orb::after { background: radial-gradient(circle, #80ffb0, transparent); }
  .star-float { animation: float-bob 5s ease-in-out infinite; } @keyframes float-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .chapter-star:hover .star-orb { transform: scale(1.18); } .star-label { margin-top: 12px; text-align: center; opacity: 0; transform: translateY(6px); transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; max-width: min(160px, 35vw); } .chapter-star:hover .star-label { opacity: 1; transform: translateY(0); } .star-label .ch-num { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 4px; } .star-label .ch-title { font-size: clamp(13px, 2.2vw, 16px); line-height: 1.3; text-shadow: 0 2px 12px rgba(0,0,0,0.8); }

  /* ─── STORY MODE & UI ─── */
  #story-mode { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: flex-end; opacity: 0; z-index: 100; overflow: hidden; }
  #story-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: background 0.8s ease; }
  #story-bg-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, rgba(4,0,12,0.6) 70%, rgba(4,0,12,0.9) 100%); }
  #back-btn { position: absolute; top: clamp(12px, 3vh, 24px); left: clamp(14px, 4vw, 28px); z-index: 20; background: rgba(8,4,20,0.7); border: 1px solid rgba(255,255,255,0.15); color: rgba(240,234,248,0.75); padding: 8px 14px 8px 10px; border-radius: 40px; cursor: pointer; font-size: 13px; font-family: 'Courier New', monospace; letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  #story-chapter-header { position: absolute; top: clamp(12px, 3vh, 24px); left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; }
  #story-chapter-label { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 2px; }
  #story-chapter-title { font-size: clamp(15px, 3vw, 22px); letter-spacing: 0.06em; }
  #dialogue-container { position: relative; z-index: 10; width: 100%; max-width: 860px; padding: clamp(12px, 3vw, 28px); padding-bottom: clamp(18px, 4vw, 36px); }
  #dialogue-box { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: clamp(16px, 3.5vw, 28px) clamp(18px, 4vw, 32px); backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4); }
  #speaker-name { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 10px; min-height: 16px; }
  #dialogue-text { font-size: clamp(15px, 2.5vw, 18px); line-height: 1.75; min-height: clamp(60px, 10vh, 90px); }
  #dialogue-cursor { display: inline-block; width: 2px; height: 1.1em; background: var(--text-secondary); margin-left: 2px; vertical-align: text-bottom; animation: cursor-blink 0.9s step-end infinite; }
  @keyframes cursor-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  #continue-btn { display: flex; align-items: center; gap: 8px; margin-top: 16px; cursor: pointer; width: fit-content; padding: 8px 20px 8px 16px; margin-left: auto; border-radius: 40px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.05); color: var(--text-secondary); font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; animation: continue-pulse 2.2s ease-in-out infinite; }
  @keyframes continue-pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
  #progress-dots { display: flex; gap: 6px; justify-content: center; margin-top: 14px; } .prog-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.2); } .prog-dot.active { background: var(--gold); transform: scale(1.4); } .prog-dot.done { background: rgba(255,255,255,0.4); }
  #veil { position: fixed; inset: 0; background: #020008; z-index: 200; pointer-events: none; opacity: 0; } #story-touch-area { position: absolute; inset: 0; z-index: 5; }
  #end-card { position: absolute; inset: 0; z-index: 15; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; background: radial-gradient(ellipse at center, rgba(40,8,80,0.92) 0%, rgba(4,0,12,0.98) 100%); padding: 40px; }
  #end-card h2 { font-size: clamp(22px, 4vw, 36px); letter-spacing: 0.12em; color: var(--gold); margin-bottom: 14px; text-shadow: 0 0 40px rgba(240,192,96,0.5); }
  #end-card p { font-size: 16px; color: var(--text-secondary); margin-bottom: 32px; line-height: 1.6; }
  #end-card button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 32px; border-radius: 40px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; }
</style>
</head>
  <body>
<div id="galaxy-map">
  <div id="deep-space"></div>
  <div class="nebula-wisp" style="width:500px;height:300px;left:-80px;top:10%;background:rgba(100,20,180,0.4);--tx:60px;--ty:-30px;animation-duration:22s;"></div>
  <div class="nebula-wisp" style="width:400px;height:350px;right:-60px;bottom:15%;background:rgba(20,80,200,0.35);--tx:-40px;--ty:50px;animation-duration:28s;animation-delay:-9s;"></div>
  <canvas id="star-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
  
  <div id="galaxy-title">
    <h1>✦ Romisa's Multiverse ✦</h1>
    <p>Choose your star. Enter the story.</p>
  </div>

  <div class="chapter-star star-ch1" style="left:22%; top:30%;" onclick="enterChapter(0)">

  </div>
  <div class="chapter-star star-ch3" style="left:15%; bottom:25%;" onclick="enterChapter(2)">

  <div class="chapter-star star-ch4" style="right:20%; bottom:28%;" onclick="enterChapter(3)">

      <div id="speaker-name"></div>

</div>

<script>
// ══════════════════════════════════════════════════════════
//  STAR FIELD GENERATOR
// ══════════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('star-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 2800);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() < 0.05 ? Math.random() * 2 + 1.2 : Math.random() * 1.1 + 0.2,
        speed: Math.random() * 0.6 + 0.2, phase: Math.random() * Math.PI * 2,
        hue: Math.random() < 0.15 ? (Math.random() < 0.5 ? 200 : 280) : 0,
        sat: Math.random() < 0.15 ? 60 : 0
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.008;
    for (const s of stars) {
      const alpha = 0.4 + 0.55 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.sat > 0 ? `hsla(${s.hue},${s.sat}%,90%,${alpha})` : `rgba(255,255,255,${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize(); draw();
})();
  // ══════════════════════════════════════════════════════════
//  THE 30-MINUTE STORY DATABASE
// ══════════════════════════════════════════════════════════
const CHAPTERS = [
  {
    id: 0, label: 'Chapter I', title: 'The Reality of Us', accent: '#e07820',
    bg: 'radial-gradient(ellipse at 40% 30%, #1a0800 0%, #0a0400 50%, #020008 100%)',
    scenes: [
      { bg: 'radial-gradient(ellipse at 40% 30%, #1a0800 0%, #0a0400 50%, #020008 100%)', speaker: '', text: 'The room is quiet. The only light comes from the soft, glowing screen of a phone. Across the world, thousands of miles away, another screen glows.' },
      { bg: 'radial-gradient(ellipse at 60% 50%, #1a0a00 0%, #080200 50%, #020008 100%)', speaker: 'Raj', text: '"It\'s crazy, isn\'t it? The oceans, the borders, the timezones... all of it standing between us."' },
      { bg: 'radial-gradient(ellipse at 30% 60%, #200c00 0%, #0c0400 50%, #020008 100%)', speaker: 'Narration', text: 'Distance is a heavy thing. It tests the mind, it tests patience, and it tests the heart. Many people break under the weight of it.' },
      { bg: 'radial-gradient(ellipse at 50% 40%, #180600 0%, #0a0200 50%, #020008 100%)', speaker: 'Raj', text: '"But when I look at your picture, Romisa... when I hear your voice or read your texts, that distance just melts. It vanishes."' },
      { bg: 'radial-gradient(ellipse at 40% 30%, #1a0800 0%, #0a0400 50%, #020008 100%)', speaker: 'Narration', text: 'This is the anchor. The reality of true love. It doesn\'t care about geography. It only cares that two souls have finally found their missing halves.' },
      { bg: 'radial-gradient(ellipse at 50% 50%, #1a0a00 0%, #080200 50%, #020008 100%)', speaker: 'Raj', text: '"Hold on just a little longer, my little girl. Every day that passes is one day closer to the moment I finally get to hold you."' }
    ],
    ending: { title: '✦ The Anchor Holds ✦', message: 'The reality of distance means nothing when the love is this strong.\n\nReturn to the galaxy and choose your next star.' }
  },
  {
    id: 1, label: 'Chapter II', title: 'The Glacial Wastes', accent: '#2080d0',
    bg: 'radial-gradient(ellipse at 50% 20%, #00101a 0%, #000c18 50%, #020008 100%)',
    scenes: [
      { bg: 'radial-gradient(ellipse at 50% 20%, #00101a 0%, #000c18 50%, #020008 100%)', speaker: 'Narration', text: 'The wind howls like a wounded beast. A jagged, endless glacier stretches into the horizon. This is the physical manifestation of the distance between them.' },
      { bg: 'radial-gradient(ellipse at 30% 40%, #001520 0%, #000a14 50%, #020008 100%)', speaker: 'Raj', text: '(Breathing heavily) "The cold here cuts right to the bone. Most travelers would turn back at the first mountain. But they don\'t know what waits for me at the end of this map."' },
      { bg: 'radial-gradient(ellipse at 70% 30%, #001018 0%, #00080f 50%, #020008 100%)', speaker: 'Narration', text: 'The ground violently shakes. Ice splinters into the sky as a towering, fifty-foot Ice Guardian rises from the frozen lake, blocking the path.' },
      { bg: 'radial-gradient(ellipse at 50% 60%, #001520 0%, #000a14 50%, #020008 100%)', speaker: 'Ice Guardian', text: '"NO ONE CROSSES THE WASTES. THE DISTANCE IS TOO GREAT. FORGET HER. TURN BACK, MORTAL."' },
      { bg: 'radial-gradient(ellipse at 50% 20%, #00101a 0%, #000c18 50%, #020008 100%)', speaker: 'Raj', text: 'He grips his weapon, a neon flame igniting in the freezing dark. "You\'re just frozen water and loud wind. I\'m not turning back. Not for you. Not for anything."' },
      { bg: 'radial-gradient(ellipse at 40% 40%, #001828 0%, #000a14 50%, #020008 100%)', speaker: 'Narration', text: 'With a blinding flash of speed, Raj dashes forward. The Guardian swings a massive fist of ice, but Raj dodges beneath it, striking the beast\'s core with a burst of pure, warm energy.' },
      { bg: 'radial-gradient(ellipse at 60% 30%, #00101a 0%, #000c18 50%, #020008 100%)', speaker: 'Raj', text: '"Nothing keeps me from Romisa." (The Guardian shatters into a million glowing crystals, leaving a clear path toward the stars).' }
    ],
    ending: { title: '✦ The Path Clears ✦', message: 'No mountain, no monster, and no amount of miles can stop him.\n\nReturn to the galaxy and choose your next star.' }
  },
  {
    id: 2, label: 'Chapter III', title: 'The Neon Future', accent: '#a030d0',
    bg: 'radial-gradient(ellipse at 50% 40%, #0f0018 0%, #080010 50%, #020008 100%)',
    scenes: [
      { bg: 'radial-gradient(ellipse at 50% 40%, #0f0018 0%, #080010 50%, #020008 100%)', speaker: 'Narration', text: 'Year 3026. The city below is a sprawling metropolis of glowing violet neon and flying ships. But inside the penthouse, it is completely peaceful.' },
      { bg: 'radial-gradient(ellipse at 40% 20%, #14001e 0%, #0c0014 50%, #020008 100%)', speaker: 'Romisa', text: '"Look at the hover-cars," she points out the massive glass window. "Do you think people a thousand years ago ever thought we would live like this?"' },
      { bg: 'radial-gradient(ellipse at 60% 60%, #100016 0%, #080010 50%, #020008 100%)', speaker: 'Raj', text: 'He walks up behind her, wrapping his arms around her waist. "They probably just wished they had a time machine so they could skip the waiting."' },
      { bg: 'radial-gradient(ellipse at 35% 45%, #120018 0%, #0a0012 50%, #020008 100%)', speaker: 'Romisa', text: 'She leans back into him, resting her head on his shoulder. "We had to wait a long time in our past life, didn\'t we? All those miles. All those borders."' },
      { bg: 'radial-gradient(ellipse at 50% 40%, #0f0018 0%, #080010 50%, #020008 100%)', speaker: 'Raj', text: '"Yes. But if you asked me to do it again, I would. I would wait another thousand years, travel through every cyberpunk city and deep space colony, just to find you again."' },
      { bg: 'radial-gradient(ellipse at 50% 50%, #14001e 0%, #0c0014 50%, #020008 100%)', speaker: 'Narration', text: 'She turns around and smiles, the violet neon reflecting in her eyes. Love doesn\'t just cross distance. It conquers time itself.' }
    ],
    ending: { title: '✦ Beyond Time ✦', message: 'A thousand years in the future, the answer is still exactly the same.\n\nReturn to the galaxy and choose your final star.' }
  },
  {
    id: 3, label: 'Chapter IV', title: 'The Day We Meet', accent: '#18c060',
    bg: 'radial-gradient(ellipse at 50% 50%, #001208 0%, #000c04 50%, #020008 100%)',
    scenes: [
      { bg: 'radial-gradient(ellipse at 50% 50%, #001208 0%, #000c04 50%, #020008 100%)', speaker: 'Narration', text: 'The airport terminal is crowded. Hundreds of people are rushing with luggage, announcements echoing over the speakers. But for Raj, everything is moving in slow motion.' },
      { bg: 'radial-gradient(ellipse at 30% 30%, #001a08 0%, #000e04 50%, #020008 100%)', speaker: 'Raj', text: '(Heart beating fast) "This is it. The day we talked about for so long. The day the screens turn into reality."' },
      { bg: 'radial-gradient(ellipse at 70% 60%, #001508 0%, #000a04 50%, #020008 100%)', speaker: 'Narration', text: 'He scans the crowd at the arrival gate. And then... the world completely stops. There she is. She looks around, her eyes searching, until they lock onto his.' },
      { bg: 'radial-gradient(ellipse at 50% 40%, #001008 0%, #000804 50%, #020008 100%)', speaker: 'Romisa', text: '"Raj..." She drops her bag. The smile that breaks across her face is brighter than any galaxy or neon city they had ever imagined.' },
      { bg: 'radial-gradient(ellipse at 50% 50%, #001208 0%, #000c04 50%, #020008 100%)', speaker: 'Narration', text: 'He runs to her, and she runs to him. When they finally collide, holding each other tight, the years of waiting, the distance, and the pain all evaporate into thin air.' },
      { bg: 'radial-gradient(ellipse at 40% 60%, #001a08 0%, #000e04 50%, #020008 100%)', speaker: 'Raj', text: 'He buries his face in her hair, tears of absolute joy in his eyes. He whispers the words that mean everything...' },
      { bg: 'radial-gradient(ellipse at 50% 50%, #001208 0%, #000c04 50%, #020008 100%)', speaker: 'Raj', text: '"Welcome home, my Romisa. We never have to say goodbye again."' }
    ],
    ending: { title: '✦ The End — And The Beginning ✦', message: 'The wait is temporary. The love is forever.\n\n— I love you, Romisa. ✦' }
  }
];
  // ══════════════════════════════════════════════════════════
//  CORE LOGIC & ANIMATION ENGINE
// ══════════════════════════════════════════════════════════
let activeChapter = null, sceneIndex = 0, isTyping = false, typeTimer = null, typeFullText = '';

function enterChapter(idx) {
  activeChapter = CHAPTERS[idx]; sceneIndex = 0;
  const veil = document.getElementById('veil'), galaxy = document.getElementById('galaxy-map'), story = document.getElementById('story-mode');
  document.getElementById('end-card').style.display = 'none'; story.style.display = 'flex';
  
  document.getElementById('story-chapter-label').style.color = activeChapter.accent;
  document.getElementById('story-chapter-label').textContent = activeChapter.label;
  document.getElementById('story-chapter-title').textContent = activeChapter.title;
  document.getElementById('story-chapter-title').style.color = activeChapter.accent;

  const dots = document.getElementById('progress-dots'); dots.innerHTML = '';
  activeChapter.scenes.forEach((_, i) => { const d = document.createElement('div'); d.className = 'prog-dot' + (i === 0 ? ' active' : ''); dots.appendChild(d); });

  gsap.to(galaxy, { duration: 0.7, scale: 2.2, opacity: 0, ease: 'power2.in', transformOrigin: 'center center' });
  gsap.to(veil, { duration: 0.35, opacity: 1, delay: 0.55, ease: 'none', onComplete: () => {
    gsap.to(story, { duration: 0.5, opacity: 1, ease: 'power2.out', delay: 0.1, onComplete: () => {
      gsap.to(veil, { duration: 0.35, opacity: 0, ease: 'none' }); loadScene(sceneIndex);
    }});
  }});
}

function loadScene(idx) {
  const scene = activeChapter.scenes[idx];
  document.getElementById('story-bg').style.background = scene.bg;
  document.getElementById('speaker-name').textContent = scene.speaker || '';
  document.getElementById('speaker-name').style.color = scene.speaker ? activeChapter.accent : 'transparent';
  
  document.querySelectorAll('.prog-dot').forEach((d, i) => { d.className = 'prog-dot' + (i === idx ? ' active' : (i < idx ? ' done' : '')); });
  
  const textEl = document.getElementById('dialogue-text'), cursorEl = document.getElementById('dialogue-cursor'), continueBtn = document.getElementById('continue-btn');
  continueBtn.style.opacity = '0'; continueBtn.style.pointerEvents = 'none';
  textEl.textContent = ''; textEl.appendChild(cursorEl);
  startTypewriter(scene.text, textEl, cursorEl, continueBtn);
}

function startTypewriter(text, container, cursor, continueBtn) {
  if (typeTimer) clearTimeout(typeTimer);
  isTyping = true; typeFullText = text; let i = 0;
  function type() {
    if (i <= text.length) {
      container.textContent = text.slice(0, i); container.appendChild(cursor); i++;
      const delay = text[i - 1] === ',' || text[i - 1] === ';' ? 55 : text[i - 1] === '.' || text[i - 1] === '!' || text[i - 1] === '?' ? 90 : Math.random() < 0.04 ? 50 : 22;
      typeTimer = setTimeout(type, delay);
    } else {
      isTyping = false; gsap.to(continueBtn, { opacity: 1, duration: 0.4, ease: 'power1.out' }); continueBtn.style.pointerEvents = 'auto';
    }
  }
  type();
}

function advanceDialogue() {
  const textEl = document.getElementById('dialogue-text'), cursorEl = document.getElementById('dialogue-cursor'), continueBtn = document.getElementById('continue-btn');
  if (isTyping) {
    if (typeTimer) clearTimeout(typeTimer);
    isTyping = false; textEl.textContent = typeFullText; textEl.appendChild(cursorEl);
    gsap.to(continueBtn, { opacity: 1, duration: 0.25 }); continueBtn.style.pointerEvents = 'auto'; return;
  }
  sceneIndex++;
  if (sceneIndex >= activeChapter.scenes.length) { showEndCard(); return; }
  const box = document.getElementById('dialogue-box');
  gsap.to(box, { opacity: 0, y: 8, duration: 0.2, ease: 'power1.in', onComplete: () => {
    loadScene(sceneIndex); gsap.to(box, { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' });
  }});
}

function showEndCard() {
  const endCard = document.getElementById('end-card'), dialogueContainer = document.getElementById('dialogue-container'), header = document.getElementById('story-chapter-header'), backBtn = document.getElementById('back-btn');
  document.getElementById('end-title').textContent = activeChapter.ending.title;
  document.getElementById('end-title').style.color = activeChapter.accent;
  document.getElementById('end-message').textContent = activeChapter.ending.message;
  document.getElementById('end-message').style.whiteSpace = 'pre-line';
  gsap.to([dialogueContainer, header, backBtn], { opacity: 0, duration: 0.3 });
  endCard.style.display = 'flex';
  gsap.fromTo(endCard, { opacity: 0, scale: 0.97 }, { opacity: 1, scale: 1, duration: 0.7, ease: 'power2.out', delay: 0.2 });
}

function returnToGalaxy() {
  if (typeTimer) clearTimeout(typeTimer); isTyping = false;
  const veil = document.getElementById('veil'), galaxy = document.getElementById('galaxy-map'), story = document.getElementById('story-mode');
  gsap.to(veil, { duration: 0.35, opacity: 1, ease: 'none', onComplete: () => {
    story.style.opacity = '0'; story.style.display = 'none'; document.getElementById('end-card').style.display = 'none';
    gsap.set([document.getElementById('dialogue-container'), document.getElementById('story-chapter-header'), document.getElementById('back-btn')], { opacity: 1 });
    gsap.set(galaxy, { scale: 0.85, opacity: 0 });
    gsap.to(galaxy, { duration: 0.7, scale: 1, opacity: 1, ease: 'power2.out' });
    gsap.to(veil, { duration: 0.4, opacity: 0, delay: 0.25, ease: 'none' });
    activeChapter = null;
  }});
}
</script>
