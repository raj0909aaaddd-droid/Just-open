const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSFX(f, d, t='sine', v=0.5) {
  if(audioCtx.state === 'suspended') audioCtx.resume();
  let o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = t; o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(f, audioCtx.currentTime);
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
  o.start(); o.stop(audioCtx.currentTime + d);
}

// === 🍎 60FPS SNAKE ENGINE ===
let snakeReq, lastSnakeT = 0, score = 0, dx = 16, dy = 0;
let snake = [{x:160, y:160}], food = {x:112, y:112};
function gameLoop(timestamp) {
  if (timestamp - lastSnakeT >= 120) {
    const c = document.getElementById('snake-canvas'), ctx = c.getContext('2d');
    ctx.clearRect(0,0,320,320);
    ctx.fillStyle = '#ff0055'; ctx.font = "26px Arial"; ctx.fillText("❤️", food.x-13, food.y+13);
    snake.forEach((p, i) => { ctx.fillStyle = i===0 ? '#00f5d4' : '#00b4d8'; ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle; ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, 7); ctx.fill(); });
    ctx.shadowBlur = 0;
    let h = {x: snake[0].x + dx, y: snake[0].y + dy};
    if(h.x < 0) h.x = 320; if(h.x > 320) h.x = 0; if(h.y < 0) h.y = 320; if(h.y > 320) h.y = 0;
    snake.unshift(h);
    if(Math.abs(h.x - food.x) < 22 && Math.abs(h.y - food.y) < 22) {
      score++; playSFX(600, 0.2, 'sine', 0.6); food = { x: Math.random()*260 + 30, y: Math.random()*260 + 30 };
      if(score >= 5) { cancelAnimationFrame(snakeReq); setTimeout(() => { showScreen('screen-tramp'); initTramp(); }, 1000); return; }
    } else { snake.pop(); }
    lastSnakeT = timestamp;
  }
  snakeReq = requestAnimationFrame(gameLoop);
}
function initSnake() { snakeReq = requestAnimationFrame(gameLoop); let tx, ty, c = document.getElementById('snake-canvas'); c.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive: false}); c.addEventListener('touchmove', e => { e.preventDefault(); if(!tx || !ty) return; let xD = tx - e.touches[0].clientX, yD = ty - e.touches[0].clientY; if(Math.abs(xD) > Math.abs(yD)) { dx = xD > 0 ? -16 : 16; dy = 0; } else { dy = yD > 0 ? -16 : 16; dx = 0; } tx = null; ty = null; }, {passive: false}); }

// === 🦘 60FPS TRAMPOLINE ENGINE ===
let trampReq, padX = 100, bx = 130, by = 0, bdx = 5, bdy = 6, tScore = 0;
function trampLoop() {
  const bot = document.getElementById('falling-bot'); bx += bdx; by += bdy;

  if(by >= 245 && by <= 270 && bx >= padX - 50 && bx <= padX + 115) { bdy = -Math.abs(bdy) - 0.7; tScore++; playSFX(400, 0.2, 'square'); document.getElementById('bounce-score').innerText = `BOUNCES: ${tScore}/10 🎯`; }

  bot.style.left = bx + 'px'; bot.style.top = by + 'px';
  if(tScore >= 10) { cancelAnimationFrame(trampReq); setTimeout(() => { showScreen('screen-lie'); }, 1000); return; }
  trampReq = requestAnimationFrame(trampLoop);
}

// === 🌌 SUPERNOVA STAR-HEART ENGINE ===
let galaxyReq, particles = []; const canvas = document.getElementById('universe-canvas'); const ctx = canvas.getContext('2d');
function getHeartPoint(t, scale) { let x = 16 * Math.pow(Math.sin(t), 3); let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)); return { x: x * scale + window.innerWidth / 2, y: y * scale + window.innerHeight / 2.5 }; }

function initGalaxy() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight; particles = [];
  for(let i = 0; i < 500; i++) {
    let t = Math.random() * Math.PI * 2; let target = getHeartPoint(t, window.innerWidth < 500 ? 12 : 18);
    particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, tx: target.x, ty: target.y, size: Math.random() * 3 + 1, alpha: Math.random(), speed: Math.random() * 0.02 + 0.01, color: `hsl(${Math.random() * 50 + 320}, 100%, 70%)` });
  }
  let heartbeat = 0;
  function animateGalaxy() {
    ctx.fillStyle = 'rgba(5, 0, 17, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    heartbeat += 0.06; let pulse = Math.sin(heartbeat) * 6; // Beating effect
    particles.forEach(p => {
      p.x += (p.tx - p.x) * p.speed; p.y += ((p.ty + pulse) - p.y) * p.speed;
      ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 15; ctx.shadowColor = p.color;
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0; galaxyReq = requestAnimationFrame(animateGalaxy);
  } animateGalaxy();
}
